# ============================================================
#  Final Rental – Framework Configuration
#  Override any property via Maven -D flags:
#  mvn test -Dbrowser=firefox -Denv=staging -Dheadless=true
# ============================================================

# ----- Environment -----
env=qa
base.url=https://testing.final.sa

# ----- Browser -----
# Options: chrome | firefox | edge
browser=chrome
headless=false

# ----- Timeouts (seconds) -----
implicit.wait=0
explicit.wait=15
page.load.timeout=60
script.timeout=15

# ----- Screenshots -----
screenshot.on.failure=true
screenshot.path=src/test/resources/screenshots/

# ----- Reports -----
extent.report.path=test-output/ExtentReport.html
extent.report.title=Final Rental – Automation Report
extent.report.name=Final Rental Test Execution

# ----- Logging -----
log.level=INFO

# ----- Test Data -----
test.data.path=src/test/resources/testdata/

# ----- Rental Business Config -----
# Minimum rental period (days)
rental.min.days=1
# VAT / Tax rate (percentage)
rental.tax.rate=14.0
# Currency symbol
rental.currency=EGP
# Date format used by the date picker
rental.date.format=MM/dd/yyyy
